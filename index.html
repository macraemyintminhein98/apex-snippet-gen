<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnipGen AI</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-lg shadow-xl max-w-md w-full text-center">
        <h1 class="text-4xl font-bold text-gray-900 mb-4">SnipGen AI</h1>
        <p class="text-lg text-gray-600 mb-6">Your AI-powered code snippet generator.</p>

        <div class="mb-4">
            <textarea id="prompt" class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" rows="3" placeholder="e.g., Python function to reverse a string"></textarea>
        </div>

        <div class="mb-6 flex space-x-2">
            <select id="language" class="flex-grow p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="python">Python</option>
                <option value="javascript">JavaScript</option>
                <option value="java">Java</option>
                <option value="csharp">C#</option>
                <option value="go">Go</option>
            </select>
            <button id="generateBtn" class="bg-blue-600 text-white px-6 py-3 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">Generate</button>
        </div>

        <pre id="output" class="bg-gray-800 text-white text-left p-4 rounded-md overflow-x-auto min-h-[100px] text-sm"><code class="language-markup">// Your generated code will appear here.</code></pre>

        <div class="mt-6">
            <p class="text-sm text-gray-500">Want more snippets? <a href="#" class="text-blue-600 hover:underline">Unlock Unlimited</a></p>
        </div>
    </div>

    <script>
      document.getElementById('generateBtn').addEventListener('click', async () => {
          const prompt = document.getElementById('prompt').value;
          const language = document.getElementById('language').value;
          const output = document.getElementById('output');
          output.textContent = 'Generating...';
          // In a real app, this would be an API call to your backend.
          try {
              const response = await fetch('/api/generate-snippet', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ prompt, language })
              });
              const data = await response.json();
              output.textContent = data.snippet || 'Error generating snippet.';
          } catch (error) {
              output.textContent = 'Failed to fetch snippet.';
              console.error('Error:', error);
          }
      });
    </script>
</body>
</html>
