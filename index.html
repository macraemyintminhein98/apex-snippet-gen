<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Apex Snippet Gen</title><meta name="description" content="Generate common code snippets instantly."><style>body{font-family:sans-serif;margin:20px;background:#f0f2f5;color:#333}h1{color:#007bff}#app{max-width:800px;margin:auto;background:#fff;padding:25px;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.1)}textarea,pre{width:calc(100% - 20px);padding:10px;margin-bottom:15px;border:1px solid #ddd;border-radius:4px}button{background:#007bff;color:#fff;padding:10px 15px;border:none;border-radius:4px;cursor:pointer}button:hover{background:#0056b3}pre{background:#eee;white-space:pre-wrap;word-wrap:break-word}</style></head><body><div id="app"><h1>Apex Snippet Gen</h1><p>Quickly generate common code snippets. Save time, focus on building.</p><textarea id="promptInput" placeholder="e.g., React useState boilerplate, Python file read, basic CSS flexbox" rows="3"></textarea><button id="generateBtn">Generate Snippet</button><h2>Generated Code:</h2><pre id="outputCode">Your snippet will appear here...</pre></div><script>document.getElementById('generateBtn').addEventListener('click', async () => {const prompt = document.getElementById('promptInput').value;if (!prompt) {alert('Please enter a prompt!'); return;}document.getElementById('outputCode').textContent = 'Generating...';try {const response = await fetch('/api/generate', {method: 'POST',headers: {'Content-Type': 'application/json'},body: JSON.stringify({ prompt })});const data = await response.json();document.getElementById('outputCode').textContent = data.snippet || 'Error: Could not generate snippet.';} catch (error) {console.error('Error:', error);document.getElementById('outputCode').textContent = 'Failed to fetch snippet.';}});</script></body></html>
